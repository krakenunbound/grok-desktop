# Allow every application command used by the Grok Desktop frontend.
[[permission]]
identifier = "allow-all-grok-commands"
description = "Full access to Grok Desktop IPC commands for the main window"
commands.allow = [
  "get_settings",
  "save_settings",
  "get_models",
  "get_app_data_dir",
  "get_privacy_audit",
  "apply_grok_privacy_config",
  "set_coding_data_retention",
  "export_privacy_report",
  "archive_and_clear_grok_logs",
  "assess_project_path",
  "list_projects",
  "add_project",
  "create_project_folder",
  "remove_project",
  "set_project_pinned",
  "set_project_archived",
  "update_project_notes",
  "touch_project",
  "get_grok_inventory",
  "set_mcp_server_enabled",
  "set_plugin_enabled",
  "get_grok_cli_overview",
  "list_agent_definitions",
  "create_agent_definition",
  "start_agent_run",
  "stop_agent_run",
  "list_chats",
  "load_chat",
  "save_chat",
  "delete_chat",
  "export_chat_markdown",
  "new_chat",
  "append_chat_message",
  "start_grok_session",
  "send_message",
  "stop_session",
  "set_session_yolo",
  "set_session_model",
  "get_session",
  "is_session_running",
  "save_image_base64",
  "import_image_path",
  "import_attachment_path",
  "discard_temp_image",
  "get_status",
  "get_usage",
  "resolve_grok_binary",
  "report_ui_ready",
  "report_ui_failed",
  "get_launch_status",
  "retry_ui_load"
]
