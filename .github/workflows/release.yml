name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows x64
            platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload native package
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Grok Desktop __VERSION__
          releaseBody: |
            Native Grok Desktop packages for Windows, Linux, and macOS.

            The Windows installer is tested on Windows 10/11. Linux packages are built on Ubuntu 22.04. macOS packages are unsigned and unnotarized because this project does not currently have Apple signing credentials; Gatekeeper may require manual approval.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
